<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'IBM Plex Sans Arabic', system-ui, -apple-system, sans-serif;
    }
    
    .splash-container {
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    
    .splash-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 35px -10px rgba(59,130,246,0.3);
    }
    
    .splash-icon svg {
      width: 70px;
      height: 70px;
    }
    
    .splash-title {
      color: white;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    
    .splash-subtitle {
      color: #94a3b8;
      font-size: 15px;
      font-weight: 500;
    }
    
    .loading-dots {
      margin-top: 32px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    
    .dot {
      width: 8px;
      height: 8px;
      background: #3b82f6;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0);
        opacity: 0.3;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="splash-icon">
      <svg width="70" height="70" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="white" fill-opacity="0.2"/>
        <path d="M14 6v16M6 14h16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 class="splash-title">WoundScan</h1>
    <p class="splash-subtitle">محلل الضماد الطبي</p>
    <div class="loading-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <script>
    // Redirect to main app after splash screen
    setTimeout(() => {
      window.location.href = '/';
    }, 1500);
  </script>
</body>
</html>
